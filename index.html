<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venture Grounds Advisor</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<style>
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --surface-2: #f3f1ea;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-faint: #999;
    --border: #e6e2d4;
    --border-strong: #d0ccbe;
    --accent: #1a1a1a;
    --success-bg: #e6f4ea;
    --success-text: #1a6b3a;
    --warn-bg: #fdf0d8;
    --warn-text: #8a5a0a;
    --danger-bg: #fbe6e6;
    --danger-text: #8a1f1f;
    --info-bg: #e6eef9;
    --info-text: #1f4b8a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1814;
      --surface: #25221d;
      --surface-2: #2d2a24;
      --text: #f0ece0;
      --text-muted: #a8a39a;
      --text-faint: #7a7670;
      --border: #3a3630;
      --border-strong: #4a463e;
      --success-bg: #1f3a28;
      --success-text: #8ad9a5;
      --warn-bg: #3a2e18;
      --warn-text: #e8c478;
      --danger-bg: #3a1f1f;
      --danger-text: #e89595;
      --info-bg: #1f2d3a;
      --info-text: #95b8e8;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }
  .container { max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }
  h1 { font-size: 28px; font-weight: 500; margin: 0 0 0.5rem; letter-spacing: -0.01em; }
  .subtitle { font-size: 15px; color: var(--text-muted); margin: 0 0 0.75rem; line-height: 1.5; }
  .podcast-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-muted); text-decoration: none; margin: 0 0 2rem; transition: color 0.15s; }
  .podcast-link:hover { color: var(--text); }
  .podcast-link .arrow { transition: transform 0.15s; }
  .podcast-link:hover .arrow { transform: translateX(2px); }
  .footer a { color: var(--text-muted); text-decoration: underline; text-decoration-color: var(--border-strong); }
  .footer a:hover { color: var(--text); }
  .corpus-toggle { background: none; border: none; padding: 0; cursor: pointer; font-size: 13px; color: var(--text-muted); margin-bottom: 0.75rem; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
  .corpus-toggle:hover { color: var(--text); }
  .corpus-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 6px; font-size: 12.5px; }
  .corpus-item .name { font-weight: 500; }
  .corpus-item .firm { color: var(--text-muted); }
  label { display: block; font-size: 13px; font-weight: 500; margin: 0 0 0.5rem; color: var(--text-muted); }
  textarea { width: 100%; min-height: 160px; padding: 14px; font-size: 15px; font-family: inherit; line-height: 1.6; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; resize: vertical; }
  textarea:focus { outline: none; border-color: var(--border-strong); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
  .char-count { font-size: 12px; color: var(--text-faint); margin-top: 4px; }
  .actions { display: flex; gap: 8px; margin-top: 1rem; margin-bottom: 2rem; }
  button { font-family: inherit; font-size: 14px; padding: 10px 18px; background: var(--accent); color: var(--bg); border: 1px solid var(--accent); border-radius: 8px; cursor: pointer; font-weight: 500; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: transparent; color: var(--text); border-color: var(--border-strong); }
  .error { background: var(--danger-bg); color: var(--danger-text); padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; }
  .tldr { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 2rem; display: flex; gap: 12px; align-items: flex-start; }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 6px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .badge.strong  { background: var(--success-bg); color: var(--success-text); }
  .badge.mixed   { background: var(--warn-bg);    color: var(--warn-text); }
  .badge.weak    { background: var(--danger-bg);  color: var(--danger-text); }
  .badge.depends { background: var(--info-bg);    color: var(--info-text); }
  .tldr p { margin: 0; font-size: 15.5px; line-height: 1.6; }
  .section { margin-bottom: 2.25rem; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0.85rem; }
  .section-header h2 { font-size: 16px; font-weight: 500; margin: 0; letter-spacing: -0.005em; }
  .section-header .icon { width: 18px; height: 18px; color: var(--text-muted); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; }
  .card-title { font-weight: 500; font-size: 14.5px; margin-bottom: 4px; }
  .card-body { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }
  .card-muted { font-size: 13px; color: var(--text-muted); line-height: 1.55; }
  .card-faint { font-size: 12.5px; color: var(--text-faint); line-height: 1.5; margin-top: 4px; }
  .card-label { font-weight: 500; }
  ul.questions { margin: 0; padding-left: 20px; font-size: 14px; line-height: 1.7; }
  ul.questions li { margin-bottom: 4px; }
  .questions-label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
  .fit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
  .fit-col-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 13px; font-weight: 500; }
  .fit-col-header.lean-in { color: var(--success-text); }
  .fit-col-header.pass    { color: var(--danger-text); }
  .investor-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .chip-header { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .chip-name { font-size: 13px; font-weight: 500; }
  .chip-firm { font-size: 11px; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .chip-firm.lean-in { background: var(--success-bg); color: var(--success-text); }
  .chip-firm.pass    { background: var(--danger-bg);  color: var(--danger-text); }
  .chip-why { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }
  .corpus-note { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 12.5px; color: var(--text-muted); line-height: 1.6; margin-top: 1rem; }
  .footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-faint); line-height: 1.6; }
  .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

  <script>
    const { useState, useEffect, useRef, createElement: h } = React;

    function App() {
      const [idea, setIdea] = useState('');
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [showCorpus, setShowCorpus] = useState(false);
      const [corpus, setCorpus] = useState(null);
      const resultRef = useRef(null);

      useEffect(() => {
        fetch('/api/investors').then(r => r.json()).then(setCorpus).catch(() => {});
      }, []);

      useEffect(() => {
        if (result && resultRef.current) {
          resultRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, [result]);

      const analyze = async () => {
        if (idea.trim().length < 30) {
          setError('Describe your idea in at least a few sentences so the analysis has something to work with.');
          return;
        }
        setError(null);
        setLoading(true);
        setResult(null);
        try {
          const r = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idea: idea.trim() })
          });
          const data = await r.json();
          if (!r.ok) {
            setError(data.error || 'Something went wrong.');
          } else {
            setResult(data);
          }
        } catch (e) {
          setError('Network error. Try again.');
        } finally {
          setLoading(false);
        }
      };

      const reset = () => { setIdea(''); setResult(null); setError(null); };

      const verdictLabels = { strong: 'Strong fit', mixed: 'Mixed signal', weak: 'Weak fit', depends: 'Depends on execution' };

      return h('div', { className: 'container' },
        h('h2', { className: 'sr-only' }, 'Venture Grounds investor advisor'),
        h('h1', null, 'Venture Grounds advisor'),
        h('p', { className: 'subtitle' },
          corpus ? `Pressure-test your idea against ${corpus.count} VCs from the Venture Grounds podcast — their frameworks, contrarian takes, and pattern recognition, grounded in actual transcripts.`
                 : 'Pressure-test your idea against VCs from the Venture Grounds podcast.'
        ),
        h('a', {
          className: 'podcast-link',
          href: 'https://www.youtube.com/@rhobusiness/podcasts',
          target: '_blank',
          rel: 'noopener noreferrer',
        }, 'Listen to Venture Grounds ', h('span', { className: 'arrow' }, '→')),

        // Corpus disclosure
        h('button', {
          className: 'corpus-toggle',
          onClick: () => setShowCorpus(!showCorpus),
          'aria-expanded': showCorpus,
        }, showCorpus ? '▾ Hide investors in the corpus' : '▸ Show investors in the corpus'),
        showCorpus && corpus && h('div', { className: 'corpus-box' },
          corpus.investors.map((i, idx) => h('div', { className: 'corpus-item', key: idx },
            h('span', { className: 'name' }, i.name),
            h('span', { className: 'firm' }, ' · ' + i.firm)
          ))
        ),

        // Input
        h('div', { style: { marginTop: '1.5rem' } },
          h('label', { htmlFor: 'idea-input' }, 'Describe your idea'),
          h('textarea', {
            id: 'idea-input',
            value: idea,
            onChange: (e) => setIdea(e.target.value),
            placeholder: 'What problem are you solving? Who is the customer? What\\'s your insight? What does the product look like? The more context, the sharper the analysis.',
            disabled: loading,
          }),
          h('div', { className: 'char-count' }, `${idea.length} characters · the more specific, the better`)
        ),

        // Actions
        h('div', { className: 'actions' },
          h('button', {
            onClick: analyze,
            disabled: loading || !idea.trim(),
          },
            loading
              ? h('span', null, h('span', { className: 'loader' }), 'Analyzing')
              : 'Analyze idea'
          ),
          (idea || result) && !loading && h('button', { className: 'secondary', onClick: reset }, 'Reset')
        ),

        error && h('div', { className: 'error' }, error),

        result && h('div', { ref: resultRef },
          // TL;DR
          h('div', { className: 'tldr' },
            result.viability && result.viability.verdict && h('span', {
              className: 'badge ' + result.viability.verdict
            }, verdictLabels[result.viability.verdict] || result.viability.verdict),
            h('p', null, result.tldr)
          ),

          // Viability
          result.viability && h('div', { className: 'section' },
            h('div', { className: 'section-header' }, h('h2', null, 'Viability')),
            h('p', { style: { margin: '0 0 1rem', fontSize: '14.5px' } }, result.viability.reasoning),
            result.viability.key_questions_to_answer && result.viability.key_questions_to_answer.length > 0 && h('div', null,
              h('div', { className: 'questions-label' }, 'Key questions to answer:'),
              h('ul', { className: 'questions' },
                result.viability.key_questions_to_answer.map((q, i) => h('li', { key: i }, q))
              )
            )
          ),

          // Focus directions
          result.focus_directions && result.focus_directions.length > 0 && h('div', { className: 'section' },
            h('div', { className: 'section-header' }, h('h2', null, 'Where to focus')),
            result.focus_directions.map((fd, i) => h('div', { className: 'card', key: i },
              h('div', { className: 'card-title' }, fd.direction),
              h('div', { className: 'card-muted' }, fd.rationale),
              fd.specifics && h('div', { className: 'card-body', style: { marginTop: '6px' } },
                h('span', { className: 'card-label' }, 'Next move: '), fd.specifics
              )
            ))
          ),

          // Moat options
          result.moat_options && result.moat_options.length > 0 && h('div', { className: 'section' },
            h('div', { className: 'section-header' }, h('h2', null, 'Moat options')),
            result.moat_options.map((m, i) => h('div', { className: 'card', key: i },
              h('div', { className: 'card-title' }, m.moat_type),
              h('div', { className: 'card-body' }, m.construction),
              h('div', { className: 'card-faint' }, 'Grounded in: ' + m.investor_basis)
            ))
          ),

          // Pivot considerations
          result.pivot_considerations && result.pivot_considerations.length > 0 && h('div', { className: 'section' },
            h('div', { className: 'section-header' }, h('h2', null, 'Pivot considerations')),
            result.pivot_considerations.map((p, i) => h('div', { className: 'card', key: i },
              h('div', { className: 'card-title' }, p.pivot),
              h('div', { className: 'card-muted' },
                h('span', { className: 'card-label' }, 'When: '), p.trigger
              ),
              h('div', { className: 'card-faint' }, 'Grounded in: ' + p.grounded_in)
            ))
          ),

          // Counterarguments
          result.counterarguments && result.counterarguments.length > 0 && h('div', { className: 'section' },
            h('div', { className: 'section-header' }, h('h2', null, 'Hardest objections')),
            result.counterarguments.map((c, i) => h('div', { className: 'card', key: i },
              h('div', { className: 'card-title' }, c.objection),
              h('div', { className: 'card-faint', style: { marginBottom: '8px' } }, 'Raised by: ' + c.raised_by),
              h('div', { className: 'card-body' },
                h('span', { className: 'card-label' }, 'How to address: '), c.how_to_address
              )
            ))
          ),

          // Investor fit
          result.investor_fit && (result.investor_fit.would_lean_in?.length > 0 || result.investor_fit.would_pass?.length > 0) &&
          h('div', { className: 'section' },
            h('div', { className: 'section-header' }, h('h2', null, 'Who would back this, who would pass')),
            h('div', { className: 'fit-grid' },
              h('div', null,
                h('div', { className: 'fit-col-header lean-in' }, '↑ Would lean in'),
                result.investor_fit.would_lean_in?.length > 0
                  ? result.investor_fit.would_lean_in.map((inv, i) => h('div', { className: 'investor-chip', key: i },
                      h('div', { className: 'chip-header' },
                        h('span', { className: 'chip-name' }, inv.name),
                        h('span', { className: 'chip-firm lean-in' }, inv.firm)
                      ),
                      h('div', { className: 'chip-why' }, inv.why)
                    ))
                  : h('div', { className: 'card-faint', style: { fontStyle: 'italic' } }, 'No clear fits.')
              ),
              h('div', null,
                h('div', { className: 'fit-col-header pass' }, '↓ Would pass'),
                result.investor_fit.would_pass?.length > 0
                  ? result.investor_fit.would_pass.map((inv, i) => h('div', { className: 'investor-chip', key: i },
                      h('div', { className: 'chip-header' },
                        h('span', { className: 'chip-name' }, inv.name),
                        h('span', { className: 'chip-firm pass' }, inv.firm)
                      ),
                      h('div', { className: 'chip-why' }, inv.why)
                    ))
                  : h('div', { className: 'card-faint', style: { fontStyle: 'italic' } }, 'None obvious.')
              )
            )
          ),

          result.missing_corpus_coverage && h('div', { className: 'corpus-note' },
            h('span', { className: 'card-label' }, 'Corpus note: '),
            result.missing_corpus_coverage
          ),

          h('div', { className: 'footer' },
            `Grounded in ${corpus ? corpus.count : '17'} investor profiles from `,
            h('a', {
              href: 'https://www.youtube.com/@rhobusiness/podcasts',
              target: '_blank',
              rel: 'noopener noreferrer',
            }, 'Venture Grounds'),
            '. Synthesis by Claude — not financial advice. Refresh the knowledge base as new episodes drop.'
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
